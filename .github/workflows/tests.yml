name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-tests:
    name: Go tests (TUI + units)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test -json ./internal/... ./test/internal/... ./test/npx/... 2>&1 | tee go-test-output.json
        continue-on-error: true

      - name: Generate Go test summary
        if: always()
        run: |
          awk '
          BEGIN {
            pass=0; fail=0; total=0
            failures=""
          }
          {
            if ($0 ~ /"Action":"pass"/ && $0 ~ /"Test":"/) {
              pass++; total++
            }
            if ($0 ~ /"Action":"fail"/ && $0 ~ /"Test":"/) {
              fail++; total++
              # Extract package name using sub
              pkg = $0
              sub(/.*"Package":"/, "", pkg)
              sub(/".*/, "", pkg)
              # Strip module prefix from package
              sub(/.*\//, "", pkg)
              # Extract test name using sub
              tst = $0
              sub(/.*"Test":"/, "", tst)
              sub(/".*/, "", tst)
              if (pkg != "" && tst != "") {
                failures = failures "| " pkg " | " tst " |\n"
              }
            }
          }
          END {
            print "## Go Test Results" > ENVIRON["GITHUB_STEP_SUMMARY"]
            if (fail == 0) {
              printf "All %d tests passed\n", total >> ENVIRON["GITHUB_STEP_SUMMARY"]
            } else {
              printf "%d failed, %d passed (%d total)\n\n", fail, pass, total >> ENVIRON["GITHUB_STEP_SUMMARY"]
              print "### Failures\n| Package | Test |" >> ENVIRON["GITHUB_STEP_SUMMARY"]
              print "|---------|------|" >> ENVIRON["GITHUB_STEP_SUMMARY"]
              printf "%s", failures >> ENVIRON["GITHUB_STEP_SUMMARY"]
            }
          }' go-test-output.json

      - name: Check Go test result
        if: always()
        run: |
          if grep -q '"Action":"fail"' go-test-output.json 2>/dev/null; then
            echo "Go tests failed"
            exit 1
          fi

  bash-tests:
    name: Bash tests (shell libs)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CI dependencies
        run: brew install coreutils

      - name: Run bash integration tests
        run: go test -json ./test/bash/... 2>&1 | tee bash-test-output.json
        continue-on-error: true

      - name: Generate bash test summary
        if: always()
        run: |
          awk '
          BEGIN {
            pass=0; fail=0; total=0
            failures=""
          }
          {
            if ($0 ~ /"Action":"pass"/ && $0 ~ /"Test":"/) {
              pass++; total++
            }
            if ($0 ~ /"Action":"fail"/ && $0 ~ /"Test":"/) {
              fail++; total++
              # Extract package name using sub
              pkg = $0
              sub(/.*"Package":"/, "", pkg)
              sub(/".*/, "", pkg)
              # Strip module prefix from package
              sub(/.*\//, "", pkg)
              # Extract test name using sub
              tst = $0
              sub(/.*"Test":"/, "", tst)
              sub(/".*/, "", tst)
              if (pkg != "" && tst != "") {
                failures = failures "| " pkg " | " tst " |\n"
              }
            }
          }
          END {
            print "## Bash Test Results" > ENVIRON["GITHUB_STEP_SUMMARY"]
            if (fail == 0) {
              printf "All %d tests passed\n", total >> ENVIRON["GITHUB_STEP_SUMMARY"]
            } else {
              printf "%d failed, %d passed (%d total)\n\n", fail, pass, total >> ENVIRON["GITHUB_STEP_SUMMARY"]
              print "### Failures\n| Package | Test |" >> ENVIRON["GITHUB_STEP_SUMMARY"]
              print "|---------|------|" >> ENVIRON["GITHUB_STEP_SUMMARY"]
              printf "%s", failures >> ENVIRON["GITHUB_STEP_SUMMARY"]
            }
          }' bash-test-output.json

      - name: Check bash test result
        if: always()
        run: |
          if grep -q '"Action":"fail"' bash-test-output.json 2>/dev/null; then
            echo "Bash tests failed"
            exit 1
          fi
